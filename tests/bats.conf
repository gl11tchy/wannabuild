# tests/bats.conf
#
# Default options sourced by tests/run.sh.
# Override any of these by exporting the same variable before invoking run.sh.

# Number of parallel jobs to run with `bats --jobs N`.
: "${BATS_JOBS:=4}"

# Default report formatter and output dir.
: "${BATS_REPORT_FORMATTER:=junit}"
: "${BATS_OUTPUT_DIR:=tests/results}"
: "${BATS_JUNIT_FILE:=tests/results/junit.xml}"

# Show per-test timing in pretty output.
: "${BATS_TIMING:=1}"

# Pretty output for human-readable runs.
: "${BATS_PRETTY:=1}"

export BATS_JOBS BATS_REPORT_FORMATTER BATS_OUTPUT_DIR BATS_JUNIT_FILE BATS_TIMING BATS_PRETTY
