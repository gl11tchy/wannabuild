# Auto-generated documentation workflow.
#
# - On push to main: regenerate docs/generated/* via scripts/generate-docs.sh.
#   If anything changed, open a PR with the diff (label: docs, automated).
# - On pull_request: regenerate and fail if anything would change. This forces
#   contributors to regen locally before merge.
name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  generate:
    name: Generate docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner (audit)
        # step-security/harden-runner v2.19.1
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450
        with:
          egress-policy: audit
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends jq
      - name: Regenerate docs/generated/*
        run: bash scripts/generate-docs.sh
      - name: Verify no diff (PR only)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          if ! git diff --exit-code -- docs/generated/; then
            echo "::error::docs/generated/ is out of date. Run \`bash scripts/generate-docs.sh\` and commit." >&2
            exit 1
          fi
      - name: Open auto-update PR (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # peter-evans/create-pull-request v8.1.1
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: docs/auto-update-${{ github.run_id }}
          base: main
          commit-message: "docs: regenerate auto-generated docs"
          title: "docs: regenerate auto-generated docs"
          body: |
            Automated update of `docs/generated/*` produced by
            `scripts/generate-docs.sh`.

            Run id: ${{ github.run_id }}
          labels: |
            docs
            automated
          delete-branch: true
          add-paths: |
            docs/generated/**
