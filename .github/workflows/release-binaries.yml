# Release binaries workflow.
#
# When a GitHub Release is published (by release-please), builds the
# wb-runtime binary for the supported platforms and attaches the archives plus
# SHA-256 checksums to the release. The runtime is the enforcement layer of
# the trust model — shipping real binaries means installs do not depend on a
# local Rust toolchain.

name: Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-upload:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: macos-latest
            label: macos-arm64
          - os: macos-13
            label: macos-x86_64
    steps:
      - name: Harden runner (audit)
        # step-security/harden-runner v2.19.1
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Build release binary
        run: |
          set -euo pipefail
          cargo build --release --locked --bin wb-runtime
      - name: Package and upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          LABEL: ${{ matrix.label }}
        run: |
          set -euo pipefail
          archive="wb-runtime-${TAG}-${LABEL}.tar.gz"
          tar -czf "$archive" -C target/release wb-runtime
          shasum -a 256 "$archive" > "$archive.sha256"
          gh release upload "$TAG" "$archive" "$archive.sha256" --clobber
