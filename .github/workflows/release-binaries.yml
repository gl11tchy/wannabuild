# Release binaries workflow.
#
# When a GitHub Release is published (by release-please), builds the wb-runtime
# gate engine for every supported host platform, packages each as a tar.gz with
# a SHA-256 checksum, and attaches them to the release. The runtime is the
# enforcement layer of the trust model — shipping real binaries means installs
# do not depend on a local Rust toolchain. The npx installer (`npx wannabuild`)
# downloads, verifies (sha256), and extracts these archives so every host runs
# the real Rust gates instead of the degraded Python mirror. The installer npm
# package is published here too (skips cleanly when NPM_TOKEN is unset).
#
# Assets per release: wb-runtime-<tag>-<label>.tar.gz (+ .tar.gz.sha256) for
# labels linux-x86_64, linux-arm64, macos-arm64, macos-x86_64, windows-x86_64.

name: Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-upload:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      # One platform failing to build must not block shipping the others; the
      # installer errors cleanly for any platform whose asset is absent.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            exe: ""
          - os: ubuntu-24.04-arm
            label: linux-arm64
            exe: ""
          - os: macos-latest
            label: macos-arm64
            exe: ""
          - os: macos-13
            label: macos-x86_64
            exe: ""
          - os: windows-latest
            label: windows-x86_64
            exe: ".exe"
    steps:
      - name: Harden runner (audit)
        # step-security/harden-runner v2.19.1
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked --bin wb-runtime
      - name: Package and upload
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          LABEL: ${{ matrix.label }}
          EXE: ${{ matrix.exe }}
        run: |
          set -euo pipefail
          archive="wb-runtime-${TAG}-${LABEL}.tar.gz"
          tar -czf "$archive" -C target/release "wb-runtime${EXE}"
          shasum -a 256 "$archive" > "$archive.sha256"
          gh release upload "$TAG" "$archive" "$archive.sha256" --clobber

  npm-publish:
    name: Publish npm installer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-upload]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden runner (audit)
        # step-security/harden-runner v2.19.1
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Setup Node
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish (skips cleanly without NPM_TOKEN)
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::warning::NPM_TOKEN secret is unset; skipping npm publish."
            echo "Add the NPM_TOKEN repository secret to enable publishing."
            echo "Provenance also requires the id-token: write permission (already set)."
            exit 0
          fi
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          # Idempotent across retried/duplicated release events: skip cleanly if
          # this version is already on the registry instead of failing (E403).
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "::notice::${name}@${version} is already published; skipping (idempotent re-run)."
            exit 0
          fi
          npm publish --provenance --access public
        working-directory: installer
