# OpenSSF Scorecard.
#
# Computes the OSSF Scorecard security score for this repository
# (branch protection, signed commits, code review, pinned actions,
# vulnerable dependencies, etc.) and publishes the results to the
# GitHub Security tab as SARIF.
#
# This is a public-credibility signal as well as a continuous audit:
# regressions in posture (e.g., new unpinned action, missing branch
# protection on main) show up as a downgraded score on the next run.
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "30 6 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Harden runner (audit)
        # step-security/harden-runner v2.19.1
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Run analysis
        # ossf/scorecard-action v2.4.3 (commit SHA, not tag-object SHA — see
        # https://github.com/ossf/scorecard-action#workflow-restrictions)
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to Code Scanning
        # github/codeql-action v3.27.5 (commit SHA, not tag-object SHA — see
        # https://github.com/ossf/scorecard-action#workflow-restrictions)
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          sarif_file: results.sarif

      - name: Upload SARIF artifact
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
