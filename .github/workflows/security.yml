# Security workflow for WannaBuild
#
# Runs:
#   - gitleaks         (secret scanning, daily + on push/PR)
#   - dependency-review     (PR-time on public repos, blocks risky transitive changes)
#   - workflow-static-check (guards against known unsafe workflow patterns)
#
# Note on workflow scanning: CodeQL does not support `actions` as a language.
# Until a pinned workflow scanner is added, keep a small static guard here and
# rely on shellcheck/yamllint/pre-commit for the broader workflow lint surface.
name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Daily at 06:23 UTC
    - cron: "23 6 * * *"

permissions:
  contents: read
  security-events: write
  pull-requests: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        # actions/checkout v4.1.7
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Run gitleaks
        # gitleaks/gitleaks-action v2; TODO pin to SHA once resolved.
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_NOTIFY_USER_LIST: ""

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request' && vars.WANNABUILD_ENABLE_DEPENDENCY_REVIEW == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        # actions/checkout v4.1.7
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Dependency review
        # actions/dependency-review-action v4.3.4
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  workflow-static-check:
    name: Workflow static check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        # actions/checkout v4.1.7
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Check workflow risk patterns
        run: |
          set -euo pipefail
          shopt -s nullglob
          workflow_files=(.github/workflows/*.yml .github/workflows/*.yaml)
          if [ "${#workflow_files[@]}" -eq 0 ]; then
            echo "::error::No GitHub Actions workflows found"
            exit 1
          fi
          if grep -RIn '^[[:space:]]*pull_request_target:' .github/workflows --exclude='labeler.yml'; then
            echo "::error::pull_request_target requires an explicit security review"
            exit 1
          fi
          if grep -nE '^[[:space:]]+(run:|uses: actions/checkout)' .github/workflows/labeler.yml; then
            echo "::error::labeler pull_request_target workflow must not check out or run PR code"
            exit 1
          fi
