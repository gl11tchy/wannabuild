# Security workflow for WannaBuild
#
# Runs:
#   - gitleaks         (secret scanning, daily + on push/PR)
#   - dependency-review     (PR-time on public repos, blocks risky transitive changes)
#   - workflow-static-check (guards against known unsafe workflow patterns)
#
# Note on workflow scanning: CodeQL does not support `actions` as a language.
# Until a pinned workflow scanner is added, keep a small static guard here and
# rely on shellcheck/yamllint/pre-commit for the broader workflow lint surface.
name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Daily at 06:23 UTC
    - cron: "23 6 * * *"

permissions:
  contents: read
  security-events: write
  pull-requests: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner (audit)
        # step-security/harden-runner v2.19.1
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - name: Run gitleaks
        # gitleaks/gitleaks-action v2.3.9
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_NOTIFY_USER_LIST: ""

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request' && vars.WANNABUILD_ENABLE_DEPENDENCY_REVIEW == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner (audit)
        # step-security/harden-runner v2.19.1
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Dependency review
        # actions/dependency-review-action v4.9.0
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  workflow-static-check:
    name: Workflow static check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner (audit)
        # step-security/harden-runner v2.19.1
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Check workflow risk patterns
        run: |
          set -euo pipefail
          shopt -s nullglob
          workflow_files=(.github/workflows/*.yml .github/workflows/*.yaml)
          if [ "${#workflow_files[@]}" -eq 0 ]; then
            echo "::error::No GitHub Actions workflows found"
            exit 1
          fi
          if grep -RIn '^[[:space:]]*pull_request_target:' .github/workflows --exclude='labeler.yml'; then
            echo "::error::pull_request_target requires an explicit security review"
            exit 1
          fi
          if grep -nE '^[[:space:]]+(run:|uses: actions/checkout)' .github/workflows/labeler.yml; then
            echo "::error::labeler pull_request_target workflow must not check out or run PR code"
            exit 1
          fi
