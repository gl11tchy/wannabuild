# Markdown link checker.
#
# Catches doc rot — broken internal references, dead external links, missing
# anchor fragments — across the 140+ markdown files in this repo. Runs on
# every PR that touches markdown and on a daily schedule so external link rot
# is caught even when the repo is quiet.
#
# Configuration lives in lychee.toml; this workflow is mostly orchestration.
name: Link check

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
    paths:
      - "**/*.md"
      - "lychee.toml"
      - ".github/workflows/lychee.yml"
  schedule:
    # Daily at 14:30 UTC — quiet hours for most contributors.
    - cron: "30 14 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: lychee-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  link-check:
    name: lychee
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        # actions/checkout v4.1.7
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Restore lychee cache
        # actions/cache v4.2.3
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            lychee-${{ runner.os }}-

      - name: Run lychee
        # lycheeverse/lychee-action v2.8.0
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          args: >-
            --config lychee.toml
            --cache
            --no-progress
            --verbose
            "**/*.md"
          fail: true

      - name: Open tracking issue on schedule failure
        if: failure() && github.event_name == 'schedule'
        # peter-evans/create-issue-from-file v5.0.0
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710
        with:
          title: "Link check (scheduled) found broken links"
          content-filepath: lychee/out.md
          labels: |
            docs
            link-rot
            automated
