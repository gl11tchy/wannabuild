# Auto-label pull requests based on file paths changed.
# Driven by .github/labeler.yml.
name: Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Apply labels
        # actions/labeler v5.0.0
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
