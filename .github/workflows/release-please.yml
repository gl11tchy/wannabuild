# Release-please workflow.
#
# - Listens to pushes on main.
# - Opens or updates a "release PR" containing CHANGELOG.md updates and a
#   version bump derived from Conventional Commits since the last tag.
# - When the release PR is merged, creates a GitHub Release and a tag.
#
# Configuration:
#   - release-please-config.json
#   - .release-please-manifest.json
name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run release-please
        # googleapis/release-please-action v4.1.3
        uses: googleapis/release-please-action@7987652d64b4581673a76e33ad5e98e3dd56832f
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
