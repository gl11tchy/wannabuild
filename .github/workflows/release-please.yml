# Release-please workflow.
#
# - Listens to pushes on main.
# - Opens or updates a "release PR" containing CHANGELOG.md updates and a
#   version bump derived from Conventional Commits since the last tag.
# - When the release PR is merged, creates a GitHub Release and a tag, then
#   builds the wb-runtime binaries for every host platform, attaches them (plus
#   SHA-256 checksums) to that release, and publishes the npx installer to npm.
#
# The binary build is a second job IN THIS workflow, gated on a release having
# been created — not a separate `on: release` workflow. release-please creates
# the release with the default GITHUB_TOKEN, and GitHub deliberately does not
# dispatch downstream workflows for token-created releases/tags, so a standalone
# `on: release: published` (or `on: push: tags`) workflow would never fire. A
# `needs` job runs in the same workflow run as the push that triggered it, so it
# is unaffected by that restriction.
#
# Configuration:
#   - release-please-config.json
#   - .release-please-manifest.json
name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Harden runner (audit)
        # step-security/harden-runner v2.19.1
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - name: Run release-please
        id: release
        # googleapis/release-please-action v5.0.0
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-binaries:
    name: Release binary (${{ matrix.label }})
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            target: ""
            exe: ""
          - os: ubuntu-24.04-arm
            label: linux-arm64
            target: ""
            exe: ""
          - os: macos-latest
            label: macos-arm64
            target: ""
            exe: ""
          # Intel macOS: cross-compiled on the Apple-Silicon runner. The hosted
          # macos-13 (Intel) runner is unavailable and the job queues forever.
          - os: macos-latest
            label: macos-x86_64
            target: x86_64-apple-darwin
            exe: ""
          - os: windows-latest
            label: windows-x86_64
            target: ""
            exe: ".exe"
    steps:
      - name: Harden runner (audit)
        # harden-runner's Windows support is experimental and disrupted the
        # rustc build (exit 127 in the v2.7.0 run); audit on POSIX runners only.
        if: runner.os != 'Windows'
        # step-security/harden-runner v2.19.1
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - name: Checkout the released tag
        # actions/checkout v6.0.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - name: Build release binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          if [ -n "${TARGET}" ]; then
            rustup target add "${TARGET}"
            cargo build --release --locked --bin wb-runtime --target "${TARGET}"
          else
            cargo build --release --locked --bin wb-runtime
          fi
      - name: Package and upload
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          LABEL: ${{ matrix.label }}
          EXE: ${{ matrix.exe }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          if [ -n "${TARGET}" ]; then
            bindir="target/${TARGET}/release"
          else
            bindir="target/release"
          fi
          archive="wb-runtime-${TAG}-${LABEL}.tar.gz"
          tar -czf "$archive" -C "$bindir" "wb-runtime${EXE}"
          # shasum ships on macOS/Linux runners; Git-Bash on Windows has
          # sha256sum instead. Both emit the same "<hash>  <file>" format.
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$archive" > "$archive.sha256"
          else
            sha256sum "$archive" > "$archive.sha256"
          fi
          gh release upload "$TAG" "$archive" "$archive.sha256" --clobber

  sign-checksums:
    name: Sign release checksums
    needs: [release-please, release-binaries]
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Harden runner (audit)
        # step-security/harden-runner v2.19.1
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - name: Install rsign2 (minisign-compatible signer, source build)
        shell: bash
        # Source build, version-pinned + --locked: reproducible, nothing to pin a
        # binary digest against (matches the no-unpinned-binaries supply-chain
        # policy). rsign2 emits standard minisign signatures.
        run: cargo install rsign2 --version 0.6.6 --locked
      - name: Sign the SHA256SUMS manifest
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This job has no checkout, so gh cannot infer the repo from a local
          # git remote; GH_REPO points the release download/upload at it directly.
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "::error::MINISIGN_SECRET_KEY secret is unset; cannot sign release checksums." >&2
            exit 1
          fi
          workdir="$(mktemp -d)"
          # Roll every per-archive .sha256 the matrix runners uploaded into one
          # manifest. Concatenate the PUBLISHED .sha256 bytes (sorted by name) so
          # the signed manifest provably equals what each runner published — never
          # re-hash here.
          gh release download "$TAG" -p '*.sha256' -D "$workdir"
          : >"$workdir/SHA256SUMS"
          while IFS= read -r sumfile; do
            cat "$sumfile" >>"$workdir/SHA256SUMS"
          done < <(find "$workdir" -maxdepth 1 -type f -name '*.sha256' | LC_ALL=C sort)
          # Private key only touches a 0600 temp file, shredded right after.
          umask 077
          keyfile="$workdir/release.key"
          printf '%s\n' "$MINISIGN_SECRET_KEY" >"$keyfile"
          rsign sign -W -s "$keyfile" \
            -x "$workdir/SHA256SUMS.minisig" \
            -t "wannabuild ${TAG} release checksums" \
            "$workdir/SHA256SUMS"
          shred -u "$keyfile"
          gh release upload "$TAG" \
            "$workdir/SHA256SUMS" "$workdir/SHA256SUMS.minisig" --clobber

  npm-publish:
    name: Publish npm installer
    needs: [release-please, release-binaries, sign-checksums]
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden runner (audit)
        # step-security/harden-runner v2.19.1
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - name: Checkout the released tag
        # actions/checkout v6.0.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - name: Setup Node
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish (skips cleanly without NPM_TOKEN)
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::warning::NPM_TOKEN secret is unset; skipping npm publish."
            echo "Add the NPM_TOKEN repository secret to enable publishing."
            echo "Provenance also requires the id-token: write permission (already set)."
            exit 0
          fi
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          # Idempotent across retried release runs: skip if already published.
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "::notice::${name}@${version} is already published; skipping (idempotent re-run)."
            exit 0
          fi
          npm publish --provenance --access public
        working-directory: installer
