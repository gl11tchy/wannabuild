# Release-please workflow.
#
# - Listens to pushes on main.
# - Opens or updates a "release PR" containing CHANGELOG.md updates and a
#   version bump derived from Conventional Commits since the last tag.
# - When the release PR is merged, creates a GitHub Release and a tag.
#
# Configuration:
#   - release-please-config.json
#   - .release-please-manifest.json
name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner (audit)
        # step-security/harden-runner v2.19.1
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450
        with:
          egress-policy: audit
      - name: Run release-please
        # googleapis/release-please-action v5.0.0
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
