# Release-please workflow.
#
# - Listens to pushes on main.
# - Opens or updates a "release PR" containing CHANGELOG.md updates and a
#   version bump derived from Conventional Commits since the last tag.
# - When the release PR is merged, creates a GitHub Release and a tag, then
#   builds the wb-runtime binaries for every host platform, attaches them (plus
#   SHA-256 checksums) to that release, and publishes the npx installer to npm.
#
# The binary build is a second job IN THIS workflow, gated on a release having
# been created — not a separate `on: release` workflow. release-please creates
# the release with the default GITHUB_TOKEN, and GitHub deliberately does not
# dispatch downstream workflows for token-created releases/tags, so a standalone
# `on: release: published` (or `on: push: tags`) workflow would never fire. A
# `needs` job runs in the same workflow run as the push that triggered it, so it
# is unaffected by that restriction.
#
# Configuration:
#   - release-please-config.json
#   - .release-please-manifest.json
name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Harden runner (audit)
        # step-security/harden-runner v2.19.1
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - name: Run release-please
        id: release
        # googleapis/release-please-action v5.0.0
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-binaries:
    name: Release binary (${{ matrix.label }})
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            exe: ""
          - os: ubuntu-24.04-arm
            label: linux-arm64
            exe: ""
          - os: macos-latest
            label: macos-arm64
            exe: ""
          - os: macos-13
            label: macos-x86_64
            exe: ""
          - os: windows-latest
            label: windows-x86_64
            exe: ".exe"
    steps:
      - name: Harden runner (audit)
        # step-security/harden-runner v2.19.1
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - name: Checkout the released tag
        # actions/checkout v6.0.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked --bin wb-runtime
      - name: Package and upload
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          LABEL: ${{ matrix.label }}
          EXE: ${{ matrix.exe }}
        run: |
          set -euo pipefail
          archive="wb-runtime-${TAG}-${LABEL}.tar.gz"
          tar -czf "$archive" -C target/release "wb-runtime${EXE}"
          shasum -a 256 "$archive" > "$archive.sha256"
          gh release upload "$TAG" "$archive" "$archive.sha256" --clobber

  npm-publish:
    name: Publish npm installer
    needs: [release-please, release-binaries]
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden runner (audit)
        # step-security/harden-runner v2.19.1
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - name: Checkout the released tag
        # actions/checkout v6.0.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - name: Setup Node
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish (skips cleanly without NPM_TOKEN)
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::warning::NPM_TOKEN secret is unset; skipping npm publish."
            echo "Add the NPM_TOKEN repository secret to enable publishing."
            echo "Provenance also requires the id-token: write permission (already set)."
            exit 0
          fi
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          # Idempotent across retried release runs: skip if already published.
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "::notice::${name}@${version} is already published; skipping (idempotent re-run)."
            exit 0
          fi
          npm publish --provenance --access public
        working-directory: installer
