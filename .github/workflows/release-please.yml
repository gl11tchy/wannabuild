# Release-please workflow.
#
# - Listens to pushes on main.
# - Opens or updates a "release PR" containing CHANGELOG.md updates and a
#   version bump derived from Conventional Commits since the last tag.
# - When the release PR is merged, creates a GitHub Release and a tag, then
#   builds the wb-runtime binaries and attaches them (plus SHA-256 checksums)
#   to that release.
#
# The binary build is a second job IN THIS workflow, gated on a release having
# been created — not a separate `on: release` workflow. release-please creates
# the release with the default GITHUB_TOKEN, and GitHub deliberately does not
# dispatch downstream workflows for token-created releases/tags, so a standalone
# `on: release: published` (or `on: push: tags`) workflow would never fire. A
# `needs` job runs in the same workflow run as the push that triggered it, so it
# is unaffected by that restriction.
#
# Configuration:
#   - release-please-config.json
#   - .release-please-manifest.json
name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Harden runner (audit)
        # step-security/harden-runner v2.19.1
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - name: Run release-please
        id: release
        # googleapis/release-please-action v5.0.0
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-binaries:
    name: Release binary (${{ matrix.label }})
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: macos-latest
            label: macos-arm64
          - os: macos-13
            label: macos-x86_64
    steps:
      - name: Harden runner (audit)
        # step-security/harden-runner v2.19.1
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - name: Checkout the released tag
        # actions/checkout v6.0.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - name: Build release binary
        run: |
          set -euo pipefail
          cargo build --release --locked --bin wb-runtime
      - name: Package and upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          LABEL: ${{ matrix.label }}
        run: |
          set -euo pipefail
          archive="wb-runtime-${TAG}-${LABEL}.tar.gz"
          tar -czf "$archive" -C target/release wb-runtime
          shasum -a 256 "$archive" > "$archive.sha256"
          gh release upload "$TAG" "$archive" "$archive.sha256" --clobber
